                    <!-- جميع صور المعرض كما هي، لم يتم تغييرها -->
                    <img src="https://raw.githubusercontent.com/Ghani-Rouabah/GhaniPharma/refs/heads/main/GhaniPharma%20photo/Capture%20d'%C3%A9cran%202025-07-13%20075647.png" alt="Image 27">

        <div class="footer-content">
            <!-- الروابط الاجتماعية كما هي -->
        </div>
    </footer>
    
    <script>
        // ==================== PROGRESS BAR ====================
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progressBar').style.width = scrolled + '%';
        });
        
        // ==================== HIDE/SHOW HEADER & ACTIVE LINK ====================
        let lastScrollTop = 0;
        const mainHeader = document.getElementById('mainHeader');
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) mainHeader.classList.add('hidden');
            else if (scrollTop < lastScrollTop) mainHeader.classList.remove('hidden');
            if (scrollTop > 50) mainHeader.classList.add('scrolled');
            else mainHeader.classList.remove('scrolled');
            lastScrollTop = scrollTop;
            
            // Mettre à jour le lien actif
            const sections = document.querySelectorAll('.section, .stats-section, .modules-section');
            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop - mainHeader.offsetHeight - 50;
                const sectionBottom = sectionTop + section.offsetHeight;
                if (scrollTop >= sectionTop && scrollTop < sectionBottom) {
                    current = section.getAttribute('id');
                }
            });
            document.querySelectorAll('#navMenu a').forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href').substring(1);
                if (href === current) link.classList.add('active');
            });
        });
        
        // ==================== MENU POPUP (AMÉLIORÉ POUR AFFICHAGE COMPLET) ====================
        const menuBtn = document.getElementById('menuBtn');
        const navMenuPopup = document.getElementById('navMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const closePopupBtn = document.getElementById('mobileMenuClose');
        
        function openPopupMenu() {
            navMenuPopup.classList.add('show');
            menuOverlay.classList.add('active');
            document.body.classList.add('menu-open');
        }
        
        function closePopupMenu() {
            navMenuPopup.classList.remove('show');
            menuOverlay.classList.remove('active');
            document.body.classList.remove('menu-open');
        }
        
        function togglePopupMenu() {
            if (navMenuPopup.classList.contains('show')) {
                closePopupMenu();
            } else {
                openPopupMenu();
            }
        }
        
        if (menuBtn) {
            menuBtn.addEventListener('click', togglePopupMenu);
        }
        
        if (closePopupBtn) {
            closePopupBtn.addEventListener('click', closePopupMenu);
        }
        
        if (menuOverlay) {
            menuOverlay.addEventListener('click', closePopupMenu);
        }
        
        // إغلاق القائمة عند النقر على أي رابط داخلي
        document.querySelectorAll('#navMenu a').forEach(link => {
            link.addEventListener('click', closePopupMenu);
        });
        
        // إغلاق القائمة إذا تم تغيير حجم الشاشة إلى سطح المكتب
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768 && navMenuPopup.classList.contains('show')) {
                closePopupMenu();
            }
        });
        
        // ==================== SMOOTH SCROLL ====================
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            const targetId = anchor.getAttribute('href');
            if (targetId === "#" || targetId === "") return;
            if (anchor.pathname !== window.location.pathname && anchor.pathname !== "") return;
            
            anchor.addEventListener('click', function(e) {
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    e.preventDefault();
                    const headerHeight = document.getElementById('mainHeader').offsetHeight;
                    const elementPosition = targetElement.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerHeight - 10;
                    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    closePopupMenu();
                }
            });
        });
        
        // ==================== YEAR MODULES ====================
        function showYear(yearId) {
            document.querySelectorAll('.year-modules').forEach(module => {
                module.classList.remove('active-year');
            });
            const targetYear = document.getElementById(yearId);
            if (targetYear) targetYear.classList.add('active-year');
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-year') === yearId) btn.classList.add('active');
            });
        }
        
        document.querySelectorAll('.year-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const yearId = this.getAttribute('data-year');
                if (yearId) {
                    showYear(yearId);
                    const modulesSection = document.getElementById('modules');
                    if (modulesSection) {
                        const headerHeight = document.getElementById('mainHeader').offsetHeight;
                        const elementPosition = modulesSection.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerHeight - 20;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                    closePopupMenu();
                }
            });
        });
        
        // ==================== SCROLL REVEAL ====================
        const revealElements = document.querySelectorAll('.section, .stats-section, .modules-section');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        revealElements.forEach(el => revealObserver.observe(el));
        
        // ==================== DOMContentLoaded ====================
        document.addEventListener('DOMContentLoaded', function() {
            showYear('annee1');
            
            // Gallery mobile
            if (window.innerWidth <= 768) {
                const galleryTrack = document.querySelector('.gallery-track');
                if (galleryTrack) galleryTrack.style.display = 'none';
                const images = document.querySelectorAll('.gallery img:not(.gallery-track img)');
                let currentIndex = 0;
                function showNextImage() {
                    images[currentIndex]?.classList.remove('active');
                    currentIndex = (currentIndex + 1) % images.length;
                    images[currentIndex]?.classList.add('active');
                }
                if (images.length) {
                    images[currentIndex]?.classList.add('active');
                    setInterval(showNextImage, 5000);
                }
            } else {
                document.querySelectorAll('.gallery img:not(.gallery-track img)').forEach(img => img.style.display = 'none');
            }
            
            // Formulaire de contact
            const contactForm = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');
            if (contactForm) {
                contactForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
                    statusMessage.style.display = 'none';
                    try {
                        const formData = new FormData(contactForm);
                        const response = await fetch(contactForm.action, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
                        if (response.ok) {
                            statusMessage.textContent = '✅ Votre message a été envoyé avec succès! Nous vous répondrons dans les plus brefs délais.';
                            statusMessage.className = 'status-message status-success';
                            statusMessage.style.display = 'block';
                            contactForm.reset();
                        } else throw new Error('Erreur lors de l\'envoi');
                    } catch (error) {
                        statusMessage.textContent = '❌ Erreur: ' + error.message;
                        statusMessage.className = 'status-message status-error';
                        statusMessage.style.display = 'block';
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer le message';
                        setTimeout(() => { if (statusMessage.style.display === 'block') statusMessage.style.display = 'none'; }, 8000);
                    }
                });
            }
            
            // Animations des statistiques
            function animateStats() {
                document.querySelectorAll('.stat-number').forEach(stat => {
                    const target = parseInt(stat.getAttribute('data-target'));
                    let current = 0;
                    const step = target / 60;
                    const timer = setInterval(() => {
                        current += step;
                        if (current >= target) { current = target; clearInterval(timer); }
                        stat.textContent = Math.floor(current);
                    }, 30);
                });
            }
            const statsObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) { animateStats(); statsObserver.unobserve(entry.target); } });
            }, { threshold: 0.3 });
            const statsSection = document.getElementById('statistics');
            if (statsSection) statsObserver.observe(statsSection);
        });
        
        function toggleSemesters(element) {
            const semestersList = element.nextElementSibling;
            if (!semestersList) return;
            document.querySelectorAll('.subject-card ul').forEach(list => {
                if (list !== semestersList && list.classList.contains('show')) {
                    list.classList.remove('show');
                    const header = list.closest('.subject-content')?.querySelector('h4');
                    if (header) header.classList.remove('active');
                }
            });
            semestersList.classList.toggle('show');
            element.classList.toggle('active');
        }
        
        function showAlert() {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.style.display = 'block';
            setTimeout(() => { alertDiv.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
