<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pharmacie - Test</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    padding: 30px;
}

/* صندوق */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    color: #2c3e50;
}

/* زر الشرح */
.info-btn {
    cursor: pointer;
    background: #3498db;
    color: white;
    border-radius: 50%;
    padding: 2px 7px;
    font-size: 12px;
    margin-left: 5px;
}

/* نص الشرح */
.info-text {
    display: none;
    background: #ecf0f1;
    padding: 8px;
    border-radius: 8px;
    color: #c0392b;
    margin-top: 5px;
}

/* توسيط الرسم */
.center {
    text-align: center;
    margin-top: 20px;
}
</style>

<script>
function toggleInfo(el) {
    let text = el.parentElement.querySelector(".info-text");
    text.style.display = (text.style.display === "block") ? "none" : "block";
}
</script>

</head>

<body>

<div class="card">

<h2>Structure chimique</h2>

<p>
Le benzène est un composé aromatique 
<span class="info-btn" onclick="toggleInfo(this)">ⓘ</span>
<div class="info-text">مركب عضوي حلقي مكوّن من 6 ذرات كربون</div>
</p>

<div class="center">

<!-- الشكل السداسي -->
<svg width="200" height="200">

  <!-- الحلقة -->
  <polygon points="100,20 170,60 170,140 100,180 30,140 30,60"
           style="fill:none;stroke:black;stroke-width:2"/>

  <!-- روابط داخلية (تقريب للبنزين) -->
  <line x1="100" y1="20" x2="170" y2="140"
        style="stroke:black;stroke-width:2"/>

  <line x1="170" y1="60" x2="30" y2="140"
        style="stroke:black;stroke-width:2"/>

  <line x1="30" y1="60" x2="100" y2="180"
        style="stroke:black;stroke-width:2"/>

</svg>

</div>

</div>

</body>
</html>
