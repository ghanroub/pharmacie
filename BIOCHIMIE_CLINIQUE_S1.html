<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Explication</title>

<style>
body {
    font-family: Arial;
    margin: 30px;
    line-height: 1.8;
}

/* الطريقة 2 */
.info-btn {
    cursor: pointer;
    color: blue;
    margin-left: 5px;
    font-weight: bold;
}

.info-text {
    display: none;
    color: red;
    margin-left: 10px;
}
</style>

<script>
function toggleInfo(element) {
    let text = element.nextElementSibling;
    if (text.style.display === "none") {
        text.style.display = "inline";
    } else {
        text.style.display = "none";
    }
}
</script>

</head>

<body>

<h2>🔹 الطريقة 1 (بدون JavaScript)</h2>

<p>
Onchocercose sans manifestations cliniques 
<details style="display:inline;">
  <summary style="display:inline; cursor:pointer; color:blue;">ⓘ</summary>
  <span style="color:red;">يعني المريض قد يكون مصاب دون ظهور أي أعراض</span>
</details>
</p>

<p>
Syndrome cutané : les onchodermites 
<details style="display:inline;">
  <summary style="display:inline; cursor:pointer; color:blue;">ⓘ</summary>
  <span style="color:red;">إصابات جلدية ناتجة عن الطفيلي</span>
</details>
</p>

<hr>

<h2>🔹 الطريقة 2 (باستعمال JavaScript)</h2>

<p>
Prurit 
<span class="info-btn" onclick="toggleInfo(this)">ⓘ</span>
<span class="info-text">حكة شديدة</span>
</p>

<p>
Urticaire 
<span class="info-btn" onclick="toggleInfo(this)">ⓘ</span>
<span class="info-text">حساسية جلدية (شرى)</span>
</p>

</body>
</html>
