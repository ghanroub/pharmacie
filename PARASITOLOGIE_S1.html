<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دليل مسكنات الألم – علب ثلاثية الأبعاد</title>
    <style>
        :root {
            --bg: #0b1120;
            --surface: #151e2f;
            --surface-light: #1e2a3d;
            --primary: #4f8ef7;
            --primary-glow: #4f8ef744;
            --accent: #2dd4bf;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #2d3a50;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-lg: 0 25px 60px rgba(0,0,0,0.6);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* ========== DESKTOP SIDEBAR ========== */
        .sidebar {
            width: 400px;
            min-width: 400px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: var(--shadow-lg);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            transition: transform 0.25s ease;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 5;
            backdrop-filter: blur(10px);
        }
        .sidebar-header .logo {
            font-size: 2rem;
            margin-bottom: 2px;
        }
        .sidebar-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .drug-list {
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .drug-card {
            background: var(--surface-light);
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .drug-card:hover {
            border-color: #4f8ef733;
            background: #253348;
            transform: translateX(-4px);
        }
        .drug-card.active {
            border-color: var(--primary);
            background: #1a3050;
            box-shadow: 0 0 28px var(--primary-glow);
            transform: translateX(-4px);
        }
        .drug-card.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            border-radius: 0 0 0 6px;
        }
        .drug-card .drug-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }
        .drug-card .drug-info {
            flex: 1;
            min-width: 0;
        }
        .drug-card .drug-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .drug-card .drug-class {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .drug-card .arrow {
            color: var(--text-muted);
            font-size: 1rem;
            transition: var(--transition);
        }
        .drug-card.active .arrow {
            color: var(--primary);
            transform: translateX(-6px);
        }

        .info-panel {
            margin: 8px 14px 20px;
            padding: 18px;
            background: #1a2840;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }
        .info-panel h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
        }
        .info-row {
            display: flex;
            gap: 6px;
            margin: 4px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .info-row span.label {
            font-weight: 600;
            color: var(--text-light);
        }
        .warning {
            margin-top: 10px;
            padding: 10px;
            background: #7f1d1d33;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #fca5a5;
            border: 1px solid #7f1d1d44;
            line-height: 1.5;
        }

        /* ========== VIEWER ========== */
        .viewer-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #1a2538 0%, #060b14 80%);
            overflow: hidden;
            touch-action: pan-x pan-y pinch-zoom;
        }
        .viewer-container canvas {
            display: block;
        }
        .viewer-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .viewer-label {
            background: #00000088;
            backdrop-filter: blur(16px);
            border: 1px solid #ffffff22;
            border-radius: 30px;
            padding: 10px 22px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            pointer-events: auto;
        }
        .viewer-hint {
            background: #00000055;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 6px 14px;
            color: #ffffffaa;
            font-size: 0.7rem;
            pointer-events: auto;
        }

        /* ========== MOBILE BOTTOM BAR ========== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                min-width: 100%;
                height: auto;
                max-height: 130px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                background: var(--surface);
                border-left: none;
                border-top: 1px solid var(--border);
                padding: 8px 10px calc(8px + var(--safe-bottom));
                z-index: 30;
                scrollbar-width: none;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            }
            .sidebar::-webkit-scrollbar {
                display: none;
            }
            .sidebar-header, .info-panel {
                display: none;
            }
            .drug-list {
                flex-direction: row;
                gap: 10px;
                padding: 0;
                flex: 1;
                align-items: center;
            }
            .drug-card {
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 8px 12px;
                min-width: 75px;
                border-radius: 16px;
                white-space: nowrap;
                transform: none;
            }
            .drug-card:hover {
                transform: none;
            }
            .drug-card.active {
                transform: scale(1.05);
            }
            .drug-card .drug-icon {
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
                border-radius: 10px;
            }
            .drug-card .drug-info {
                text-align: center;
            }
            .drug-card .drug-name {
                font-size: 0.7rem;
                font-weight: 700;
                line-height: 1.2;
            }
            .drug-card .drug-class {
                display: none;
            }
            .drug-card .arrow {
                display: none;
            }

            .viewer-container {
                flex: 1;
                height: 100%;
            }
            .viewer-overlay {
                top: 10px;
                left: 10px;
                right: 10px;
            }
            .viewer-label {
                font-size: 0.8rem;
                padding: 6px 14px;
            }
            .viewer-hint {
                font-size: 0.65rem;
                padding: 4px 10px;
            }

            /* Floating info card for mobile */
            .mobile-info-card {
                position: fixed;
                bottom: 150px;
                left: 16px;
                right: 16px;
                background: #1e293bdd;
                backdrop-filter: blur(20px);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 16px;
                z-index: 40;
                box-shadow: 0 20px 40px rgba(0,0,0,0.6);
                display: none;
                pointer-events: auto;
                animation: slideUp 0.3s ease;
            }
            .mobile-info-card.active {
                display: block;
            }
            @keyframes slideUp {
                from { transform: translateY(30px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            .mobile-info-card .close-btn {
                position: absolute;
                top: 8px;
                left: 8px;
                background: #ffffff22;
                border: none;
                color: #fff;
                border-radius: 50%;
                width: 28px;
                height: 28px;
                font-size: 1rem;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== SIDEBAR (desktop) ==================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">💊</div>
            <h1>دليل مسكنات الألم</h1>
            <p class="subtitle">اضغط على الدواء لعرض العلبة ثلاثية الأبعاد</p>
        </div>
        <div class="drug-list" id="drugList"></div>
        <div class="info-panel" id="infoPanel">
            <h3 id="infoTitle">باراسيتامول</h3>
            <div class="info-row"><span class="label">التصنيف:</span> <span id="infoClass">مسكن وخافض حرارة</span></div>
            <div class="info-row"><span class="label">الاستخدامات:</span> <span id="infoUses">الصداع، الحمى</span></div>
            <div class="info-row"><span class="label">الاسم العلمي:</span> <span id="infoScientific">Paracetamol</span></div>
            <div class="warning"><strong>⚠ تحذير:</strong> <span id="infoWarningText">لا تتجاوز الجرعة المحددة.</span></div>
        </div>
    </aside>

    <!-- ==================== 3D VIEWER ==================== -->
    <div class="viewer-container" id="viewerContainer">
        <div class="viewer-overlay">
            <div class="viewer-label" id="viewerLabel">💊 باراسيتامول</div>
            <div class="viewer-hint">🖱 اسحب للتدوير | 🔍 للتكبير</div>
        </div>
    </div>

    <!-- Mobile floating info (hidden by default) -->
    <div class="mobile-info-card" id="mobileInfoCard">
        <button class="close-btn" id="closeMobileInfo">✕</button>
        <h3 id="mobileInfoTitle" style="margin-bottom:6px;color:#fff;"></h3>
        <div class="info-row"><span class="label">التصنيف:</span> <span id="mobileInfoClass"></span></div>
        <div class="info-row"><span class="label">الاستخدام:</span> <span id="mobileInfoUses"></span></div>
        <div class="info-row"><span class="label">العلمي:</span> <span id="mobileInfoScientific"></span></div>
        <div class="warning" style="margin-top:8px;"><span id="mobileInfoWarning"></span></div>
    </div>

    <!-- ==================== THREE.JS IMPORT MAP ==================== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== DRUG DATA WITH BOX INFO ====================
        const drugData = [
            {
                id: 'paracetamol',
                name: 'باراسيتامول',
                nameEn: 'Paracetamol',
                class: 'مسكن ألم وخافض حرارة',
                uses: 'الصداع، آلام العضلات، الحمى',
                scientific: 'Paracetamol',
                warning: 'لا تتجاوز 4 غرام يومياً. تجنب الكحول.',
                icon: '🔵',
                iconBg: '#3b82f6',
                boxColor: '#1e5abf',
                boxAccent: '#f5f5f0',
                dosage: '500 mg أقراص',
                brand: 'باراسيتامول',
            },
            {
                id: 'ibuprofen',
                name: 'ايبوبروفين',
                nameEn: 'Ibuprofen',
                class: 'مضاد التهاب (NSAID)',
                uses: 'الالتهابات، آلام المفاصل، الصداع',
                scientific: 'Ibuprofen',
                warning: 'يؤخذ مع الطعام. لا يستخدم لقرحة المعدة.',
                icon: '🟠',
                iconBg: '#f97316',
                boxColor: '#e05a2c',
                boxAccent: '#ffffff',
                dosage: '400 mg أقراص',
                brand: 'ايبوبروفين',
            },
            {
                id: 'aspirin',
                name: 'أسبرين',
                nameEn: 'Aspirin',
                class: 'مسكن ومضاد تخثر',
                uses: 'الصداع، الوقاية من الجلطات',
                scientific: 'Acetylsalicylic Acid',
                warning: 'يمنع للأطفال. يزيد خطر النزيف.',
                icon: '⚪',
                iconBg: '#94a3b8',
                boxColor: '#d1d5db',
                boxAccent: '#1f2937',
                dosage: '100 mg أقراص',
                brand: 'أسبرين',
            },
            {
                id: 'diclofenac',
                name: 'ديكلوفيناك',
                nameEn: 'Diclofenac',
                class: 'مضاد التهاب قوي (NSAID)',
                uses: 'آلام المفاصل، الروماتيزم',
                scientific: 'Diclofenac Sodium',
                warning: 'تحت إشراف طبي. قد يرفع الضغط.',
                icon: '🟤',
                iconBg: '#a16252',
                boxColor: '#8b5a3c',
                boxAccent: '#f5e6d3',
                dosage: '50 mg أقراص',
                brand: 'ديكلوفيناك',
            },
            {
                id: 'naproxen',
                name: 'نابروكسين',
                nameEn: 'Naproxen',
                class: 'مضاد التهاب طويل المفعول',
                uses: 'التهاب المفاصل، الصداع النصفي',
                scientific: 'Naproxen Sodium',
                warning: 'طويل المفعول، مع الطعام.',
                icon: '🔷',
                iconBg: '#2563eb',
                boxColor: '#1d4ed8',
                boxAccent: '#e0e7ff',
                dosage: '250 mg أقراص',
                brand: 'نابروكسين',
            },
            {
                id: 'tramadol',
                name: 'ترامادول',
                nameEn: 'Tramadol',
                class: 'مسكن أفيوني متوسط',
                uses: 'آلام متوسطة إلى شديدة',
                scientific: 'Tramadol HCl',
                warning: 'يسبب الإدمان، بوصفة طبية فقط.',
                icon: '🟢',
                iconBg: '#22c55e',
                boxColor: '#15803d',
                boxAccent: '#dcfce7',
                dosage: '50 mg كبسولات',
                brand: 'ترامادول',
            },
            {
                id: 'morphine',
                name: 'مورفين',
                nameEn: 'Morphine',
                class: 'مسكن أفيوني قوي',
                uses: 'آلام شديدة، آلام السرطان',
                scientific: 'Morphine Sulfate',
                warning: 'رقابة مشددة، خطر الإدمان.',
                icon: '🔴',
                iconBg: '#ef4444',
                boxColor: '#b91c1c',
                boxAccent: '#fee2e2',
                dosage: '10 mg أمبولات',
                brand: 'مورفين',
            },
        ];

        // ==================== DOM ELEMENTS ====================
        const drugListEl = document.getElementById('drugList');
        const infoTitle = document.getElementById('infoTitle');
        const infoClass = document.getElementById('infoClass');
        const infoUses = document.getElementById('infoUses');
        const infoScientific = document.getElementById('infoScientific');
        const infoWarningText = document.getElementById('infoWarningText');
        const viewerLabel = document.getElementById('viewerLabel');
        const viewerContainer = document.getElementById('viewerContainer');
        const mobileInfoCard = document.getElementById('mobileInfoCard');
        const closeMobileBtn = document.getElementById('closeMobileInfo');

        let activeDrugId = 'paracetamol';
        let currentModelGroup = new THREE.Group();
        const textureCache = new Map();

        // ==================== BUILD DRUG LIST ====================
        drugData.forEach(drug => {
            const card = document.createElement('div');
            card.className = 'drug-card';
            card.dataset.drugId = drug.id;
            if (drug.id === activeDrugId) card.classList.add('active');
            card.innerHTML = `
                <div class="drug-icon" style="background:${drug.iconBg};">${drug.icon}</div>
                <div class="drug-info">
                    <div class="drug-name">${drug.name}</div>
                    <div class="drug-class">${drug.class}</div>
                </div>
                <div class="arrow">◀</div>
            `;
            card.addEventListener('click', () => selectDrug(drug.id));
            drugListEl.appendChild(card);
        });

        // ==================== THREE.JS SETUP ====================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x060b14, 0.00012);

        const camera = new THREE.PerspectiveCamera(45, viewerContainer.clientWidth / viewerContainer.clientHeight, 0.5, 30);
        camera.position.set(5.2, 3.2, 8.2);
        camera.lookAt(0, 0.4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(viewerContainer.clientWidth, viewerContainer.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        viewerContainer.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.9;
        controls.minDistance = 3.8;
        controls.maxDistance = 12;
        controls.maxPolarAngle = Math.PI * 0.65;
        controls.target.set(0, 0.25, 0);
        controls.update();

        // ==================== LIGHTING ====================
        const ambientLight = new THREE.AmbientLight(0x8899bb, 1.5);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xfff5e6, 6.5);
        keyLight.position.set(7, 9, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024, 1024);
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 35;
        keyLight.shadow.camera.left = -7;
        keyLight.shadow.camera.right = 7;
        keyLight.shadow.camera.top = 7;
        keyLight.shadow.camera.bottom = -7;
        keyLight.shadow.bias = -0.0002;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xaaccff, 1.6);
        fillLight.position.set(-3, 1.5, -3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffffff, 1.8);
        rimLight.position.set(0, 1, -5);
        scene.add(rimLight);

        const bottomLight = new THREE.DirectionalLight(0x8899cc, 1.0);
        bottomLight.position.set(0, -0.5, 2);
        scene.add(bottomLight);

        // ==================== PLATFORM ====================
        const platformGeom = new THREE.CylinderGeometry(2.1, 2.2, 0.18, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x2a3648, roughness: 0.4, metalness: 0.5 });
        const platform = new THREE.Mesh(platformGeom, platformMat);
        platform.position.y = -1.4;
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);

        const ringGeom = new THREE.TorusGeometry(2.05, 0.05, 32, 80);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x4f8ef7, roughness: 0.2, metalness: 0.7, emissive: 0x1a3a60, emissiveIntensity: 0.4 });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = -1.3;
        ring.receiveShadow = true;
        scene.add(ring);

        // Particles
        const particlesGeom = new THREE.BufferGeometry();
        const count = 160;
        const posArray = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            posArray[i * 3] = (Math.random() - 0.5) * 12;
            posArray[i * 3 + 1] = (Math.random() - 0.5) * 8;
            posArray[i * 3 + 2] = (Math.random() - 0.5) * 10;
        }
        particlesGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ color: 0x4f8ef7, size: 0.02, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false });
        const particles = new THREE.Points(particlesGeom, particlesMat);
        scene.add(particles);

        // Model container
        currentModelGroup = new THREE.Group();
        scene.add(currentModelGroup);

        // ==================== TEXTURE GENERATION ====================
        function createBoxTextures(drug) {
            const cacheKey = drug.id;
            if (textureCache.has(cacheKey)) return textureCache.get(cacheKey);

            const size = 512;
            const frontCanvas = document.createElement('canvas');
            frontCanvas.width = size;
            frontCanvas.height = size;
            const ctx = frontCanvas.getContext('2d');

            // Background
            ctx.fillStyle = drug.boxColor;
            ctx.fillRect(0, 0, size, size);

            // White label panel
            ctx.fillStyle = drug.boxAccent;
            const panelX = 40, panelY = 60, panelW = size - 80, panelH = size - 180;
            ctx.fillRect(panelX, panelY, panelW, panelH);
            ctx.strokeStyle = '#00000033';
            ctx.lineWidth = 4;
            ctx.strokeRect(panelX, panelY, panelW, panelH);

            // Drug name Arabic
            ctx.fillStyle = '#111827';
            ctx.font = 'bold 68px "Tajawal", "Cairo", "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.direction = 'rtl';
            ctx.fillText(drug.name, size/2, panelY + 100);

            // Dosage
            ctx.font = '32px "Tajawal", "Segoe UI", sans-serif';
            ctx.fillStyle = '#374151';
            ctx.fillText(drug.dosage, size/2, panelY + 170);

            // Brand name small
            ctx.font = 'italic 26px "Tajawal", sans-serif';
            ctx.fillStyle = '#1f2937';
            ctx.fillText(drug.nameEn, size/2, panelY + 230);

            // Decorative line
            ctx.beginPath();
            ctx.strokeStyle = drug.boxColor;
            ctx.lineWidth = 6;
            ctx.moveTo(panelX+20, panelY+120);
            ctx.lineTo(panelX+panelW-20, panelY+120);
            ctx.stroke();

            const frontTexture = new THREE.CanvasTexture(frontCanvas);
            frontTexture.colorSpace = THREE.SRGBColorSpace;
            frontTexture.wrapS = THREE.ClampToEdgeWrapping;
            frontTexture.wrapT = THREE.ClampToEdgeWrapping;

            // Side texture (simplified vertical text)
            const sideCanvas = document.createElement('canvas');
            sideCanvas.width = size;
            sideCanvas.height = size;
            const sctx = sideCanvas.getContext('2d');
            sctx.fillStyle = drug.boxColor;
            sctx.fillRect(0, 0, size, size);
            sctx.fillStyle = '#ffffffcc';
            sctx.font = 'bold 42px "Tajawal", sans-serif';
            sctx.textAlign = 'center';
            sctx.save();
            sctx.translate(size/2, size/2);
            sctx.rotate(-Math.PI/2);
            sctx.fillText(drug.name, 0, 10);
            sctx.restore();
            sctx.font = '24px "Tajawal"';
            sctx.fillStyle = '#ffffff99';
            sctx.fillText(drug.dosage, size/2, size-50);
            const sideTexture = new THREE.CanvasTexture(sideCanvas);
            sideTexture.colorSpace = THREE.SRGBColorSpace;

            // Top texture
            const topCanvas = document.createElement('canvas');
            topCanvas.width = size;
            topCanvas.height = size;
            const tctx = topCanvas.getContext('2d');
            tctx.fillStyle = drug.boxColor;
            tctx.fillRect(0, 0, size, size);
            tctx.fillStyle = '#ffffffdd';
            tctx.font = 'bold 30px "Tajawal"';
            tctx.textAlign = 'center';
            tctx.fillText(drug.nameEn, size/2, size/2);
            const topTexture = new THREE.CanvasTexture(topCanvas);
            topTexture.colorSpace = THREE.SRGBColorSpace;

            const textures = { front: frontTexture, side: sideTexture, top: topTexture };
            textureCache.set(cacheKey, textures);
            return textures;
        }

        function createMedicineBox(drug) {
            const textures = createBoxTextures(drug);
            const w = 2.0, h = 1.1, d = 3.8; // width, height, depth (realistic box proportions)
            const geometry = new THREE.BoxGeometry(w, h, d);

            const materials = [
                new THREE.MeshStandardMaterial({ map: textures.side, roughness: 0.55, metalness: 0.05 }), // right
                new THREE.MeshStandardMaterial({ map: textures.side, roughness: 0.55, metalness: 0.05 }), // left
                new THREE.MeshStandardMaterial({ map: textures.top, roughness: 0.55, metalness: 0.05 }), // top
                new THREE.MeshStandardMaterial({ map: textures.top, roughness: 0.55, metalness: 0.05 }), // bottom
                new THREE.MeshStandardMaterial({ map: textures.front, roughness: 0.55, metalness: 0.05 }), // front
                new THREE.MeshStandardMaterial({ map: textures.front, roughness: 0.55, metalness: 0.05 }), // back
            ];

            const box = new THREE.Mesh(geometry, materials);
            box.castShadow = true;
            box.receiveShadow = true;
            box.position.y = 0.55; // sit on platform

            // Group for rotation centering
            const group = new THREE.Group();
            group.add(box);

            // Add subtle glossy edge lines
            const edgeGeom = new THREE.EdgesGeometry(geometry);
            const edgeLine = new THREE.LineSegments(edgeGeom, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 }));
            box.add(edgeLine);

            return group;
        }

        function selectDrug(drugId) {
            if (activeDrugId === drugId && currentModelGroup.children.length > 0) return;
            activeDrugId = drugId;

            document.querySelectorAll('.drug-card').forEach(card => {
                card.classList.toggle('active', card.dataset.drugId === drugId);
            });

            const drug = drugData.find(d => d.id === drugId);
            if (!drug) return;

            // Update desktop info
            infoTitle.textContent = drug.name;
            infoClass.textContent = drug.class;
            infoUses.textContent = drug.uses;
            infoScientific.textContent = drug.scientific;
            infoWarningText.textContent = drug.warning;
            viewerLabel.textContent = `📦 ${drug.name}`;

            // Update mobile info card
            document.getElementById('mobileInfoTitle').textContent = drug.name;
            document.getElementById('mobileInfoClass').textContent = drug.class;
            document.getElementById('mobileInfoUses').textContent = drug.uses;
            document.getElementById('mobileInfoScientific').textContent = drug.scientific;
            document.getElementById('mobileInfoWarning').textContent = drug.warning;

            // Remove old model
            while (currentModelGroup.children.length) {
                const child = currentModelGroup.children[0];
                disposeObjectRecursive(child);
                currentModelGroup.remove(child);
            }

            const newModel = createMedicineBox(drug);
            currentModelGroup.add(newModel);

            // Entrance animation
            currentModelGroup.scale.set(0.01, 0.01, 0.01);
            const startTime = performance.now();
            function animScale(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / 450, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                const s = 0.01 + (1 - 0.01) * ease;
                currentModelGroup.scale.setScalar(s);
                if (t < 1) requestAnimationFrame(animScale);
                else currentModelGroup.scale.setScalar(1);
            }
            requestAnimationFrame(animScale);

            // On mobile, show floating info card
            if (window.innerWidth <= 768) {
                mobileInfoCard.classList.add('active');
            }
        }

        function disposeObjectRecursive(obj) {
            if (!obj) return;
            obj.traverse(child => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) child.material.forEach(m => disposeMaterial(m));
                    else disposeMaterial(child.material);
                }
            });
        }
        function disposeMaterial(mat) {
            if (!mat) return;
            if (mat.map) mat.map.dispose();
            mat.dispose();
        }

        // Mobile close info button
        closeMobileBtn.addEventListener('click', () => {
            mobileInfoCard.classList.remove('active');
        });

        // Close mobile info when tapping outside? not needed.

        // ==================== ANIMATION LOOP ====================
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            controls.update();
            particles.rotation.y += dt * 0.07;
            ring.scale.setScalar(1 + Math.sin(performance.now()*0.002)*0.12);
            ring.material.emissiveIntensity = 0.3 + Math.sin(performance.now()*0.003)*0.3;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const w = viewerContainer.clientWidth;
            const h = viewerContainer.clientHeight;
            camera.aspect = w / Math.max(h, 1);
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            if (window.innerWidth <= 768) {
                mobileInfoCard.classList.remove('active');
            }
        });

        // Keyboard navigation
        window.addEventListener('keydown', (e) => {
            const idx = drugData.findIndex(d => d.id === activeDrugId);
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                e.preventDefault();
                const next = (idx + 1) % drugData.length;
                selectDrug(drugData[next].id);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                const prev = (idx - 1 + drugData.length) % drugData.length;
                selectDrug(drugData[prev].id);
            } else if (e.key === 'r' || e.key === 'R') {
                controls.autoRotate = !controls.autoRotate;
            }
        });

        // Initialize
        selectDrug('paracetamol');
        animate();
    </script>
</body>
</html>
