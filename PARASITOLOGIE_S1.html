<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>مسكنات الألم | صور حقيقية ثلاثية الأبعاد</title>
  <!-- خطوط عربية -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
      font-family: 'Tajawal', 'Cairo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.4) 0%, rgba(203, 213, 225, 0.2) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .main-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1300px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 3.5rem;
      box-shadow: 0 35px 70px rgba(0, 20, 40, 0.25), inset 0 2px 8px rgba(255,255,255,0.8);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(to left, #0b3d5f, #1a6b9e, #0f4c6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .header h1 i {
      background: #0b3d5f;
      color: white;
      padding: 0.5rem;
      border-radius: 50%;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #1e4b6b, #0a3142);
      box-shadow: 0 12px 20px rgba(0,80,120,0.4);
      -webkit-text-fill-color: white;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #2c4b60;
      font-weight: 500;
      background: rgba(255,255,255,0.6);
      display: inline-block;
      padding: 0.4rem 2rem;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      margin-top: 0.5rem;
    }

    .drugs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.8rem;
    }

    .drug-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      border-radius: 2.2rem;
      padding: 1.8rem 1.2rem;
      box-shadow: 0 25px 45px rgba(0, 32, 64, 0.2), inset 0 1px 10px white;
      transition: all 0.35s ease;
      border: 1px solid rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
    }

    .drug-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 35px 55px rgba(0, 82, 136, 0.35);
      background: rgba(255,255,255,0.95);
    }

    .drug-icon {
      font-size: 2.8rem;
      color: #0f4c6b;
      margin-bottom: 0.5rem;
      background: #e2edf7;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .drug-name {
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: #083047;
    }

    .drug-sub {
      color: #2f5a72;
      font-weight: 500;
      margin: 0.5rem 0;
      background: rgba(15,76,107,0.1);
      padding: 0.2rem 1rem;
      border-radius: 20px;
    }

    .btn-view {
      background: linear-gradient(135deg, #135b7a, #08344a);
      border: none;
      color: white;
      font-weight: 700;
      padding: 0.6rem 1.8rem;
      border-radius: 3rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 15px rgba(0,80,120,0.3);
    }

    .display-section {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(30px);
      border-radius: 2.8rem;
      padding: 2rem;
      box-shadow: 0 30px 45px rgba(0,20,40,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product-box {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      width: 100%;
    }

    /* حاوية الصورة ثلاثية الأبعاد */
    .image-3d-wrapper {
      flex: 1 1 350px;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px;
      min-height: 300px;
    }

    .image-3d-card {
      width: 260px;
      height: 320px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s linear;
      transform-style: preserve-3d;
      cursor: grab;
      border: 4px solid white;
      background: #f2f6fa;
      position: relative;
    }

    .image-3d-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
      pointer-events: none;
    }

    .drug-desc-panel {
      flex: 1 1 350px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(15px);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .rotate-hint {
      margin-top: 1rem;
      background: #eaf0f5;
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .placeholder-icon {
      font-size: 5rem;
      color: #8899aa;
    }

    @media (max-width: 700px) {
      .image-3d-card {
        width: 220px;
        height: 280px;
      }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="header">
    <h1>
      <i class="fas fa-capsules"></i> مسكنات الألم
    </h1>
    <div class="subtitle">اضغط على الدواء لعرض الصورة الحقيقية للعلبة</div>
  </div>

  <div class="drugs-grid" id="drugGrid"></div>

  <div class="display-section" id="displayArea">
    <div class="viewer-title" style="font-weight:700; font-size:1.5rem; margin-bottom:1rem;">
      <i class="fas fa-cube"></i> <span id="selectedDrugTitle">اختر دواءً</span>
    </div>
    <div class="product-box">
      <div class="image-3d-wrapper">
        <div class="image-3d-card" id="image3DCard">
          <i class="fas fa-image placeholder-icon" id="placeholderIcon"></i>
          <img id="realDrugImage" src="" alt="علبة الدواء" style="display: none;">
        </div>
      </div>
      <div class="drug-desc-panel">
        <h3><i class="fas fa-info-circle"></i> <span id="drugDynamicName">...</span></h3>
        <p id="drugDescription" style="font-size:1.1rem; line-height:1.9;">اضغط على أي مسكن للألم من الأعلى لعرض صورته الحقيقية وتفاصيله.</p>
        <div class="rotate-hint">
          <i class="fas fa-arrows-spin"></i> اسحب الصورة بالماوس لرؤية التأثير ثلاثي الأبعاد
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ------ بيانات الأدوية مع روابط صور حقيقية (مصادر موثوقة ومباشرة) ------
    const drugsData = [
      {
        id: 'paracetamol',
        name: 'باراسيتامول',
        brand: 'بانادول / أدول',
        icon: 'fa-solid fa-pills',
        description: 'مسكن ألم وخافض حرارة. يعمل مركزياً. آمن بالجرعات المحددة للصداع وآلام الأسنان.',
        // رابط صورة حقيقية لعلبة بانادول (صورة PNG شفافة من مصدر عام)
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Panadol_500mg_pack.jpg/640px-Panadol_500mg_pack.jpg'
      },
      {
        id: 'ibuprofen',
        name: 'ايبوبروفين',
        brand: 'بروفين / موترين',
        icon: 'fa-solid fa-capsules',
        description: 'مضاد التهاب غير ستيرويدي. يخفف الألم والتورم. مناسب لآلام المفاصل والعضلات.',
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Ibuprofen_200mg_Tablets.jpg/640px-Ibuprofen_200mg_Tablets.jpg'
      },
      {
        id: 'diclofenac',
        name: 'ديكلوفيناك',
        brand: 'فولتارين',
        icon: 'fa-solid fa-tablets',
        description: 'مسكن قوي مضاد للالتهابات. يستخدم لآلام الظهر والنقرس. يتوفر كحبوب ومراهم.',
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Voltaren_50mg_tablets.jpg/640px-Voltaren_50mg_tablets.jpg'
      },
      {
        id: 'aspirin',
        name: 'أسبرين',
        brand: 'أسبرين / أسبوسيد',
        icon: 'fa-solid fa-prescription-bottle',
        description: 'مسكن ومضاد التهاب ومميع للدم. فعال للصداع. لا يستخدم للأطفال.',
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Aspirin-50mg.jpg/640px-Aspirin-50mg.jpg'
      },
      {
        id: 'naproxen',
        name: 'نابروكسين',
        brand: 'نابروسين',
        icon: 'fa-solid fa-file-medical',
        description: 'طويل المفعول من مضادات الالتهاب. يعالج التهاب المفاصل والنقرس.',
        image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Naproxen_250mg_tablets.jpg/640px-Naproxen_250mg_tablets.jpg'
      }
    ];

    const drugGrid = document.getElementById('drugGrid');
    const image3DCard = document.getElementById('image3DCard');
    const realDrugImage = document.getElementById('realDrugImage');
    const placeholderIcon = document.getElementById('placeholderIcon');
    const drugDynamicName = document.getElementById('drugDynamicName');
    const drugDescription = document.getElementById('drugDescription');
    const selectedDrugTitle = document.getElementById('selectedDrugTitle');

    // --- التحكم بالتدوير الثلاثي الأبعاد للصورة ---
    let isDragging = false;
    let startX, startY;
    let currentRotateX = 0;
    let currentRotateY = 0;

    function updateImageRotation() {
      if (image3DCard) {
        image3DCard.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
      }
    }
    updateImageRotation();

    function onMouseDown(e) {
      e.preventDefault();
      isDragging = true;
      startX = e.clientX || (e.touches && e.touches[0].clientX);
      startY = e.clientY || (e.touches && e.touches[0].clientY);
      image3DCard.style.cursor = 'grabbing';
    }

    function onMouseMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      const deltaX = clientX - startX;
      const deltaY = clientY - startY;
      currentRotateY += deltaX * 0.4;
      currentRotateX -= deltaY * 0.4;
      currentRotateX = Math.max(-30, Math.min(30, currentRotateX));
      updateImageRotation();
      startX = clientX;
      startY = clientY;
    }

    function onMouseUp() {
      if (isDragging) {
        isDragging = false;
        image3DCard.style.cursor = 'grab';
      }
    }

    image3DCard.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    image3DCard.addEventListener('touchstart', onMouseDown, {passive: false});
    window.addEventListener('touchmove', onMouseMove, {passive: false});
    window.addEventListener('touchend', onMouseUp);
    image3DCard.addEventListener('dragstart', (e) => e.preventDefault());

    // عرض دواء محدد
    function displayDrug(drug) {
      if (!drug) return;
      drugDynamicName.textContent = drug.name;
      drugDescription.textContent = drug.description;
      selectedDrugTitle.textContent = drug.name + ' (' + drug.brand + ')';

      // إظهار الصورة الحقيقية
      if (drug.image) {
        realDrugImage.src = drug.image;
        realDrugImage.alt = `علبة ${drug.brand}`;
        realDrugImage.style.display = 'block';
        placeholderIcon.style.display = 'none';
      } else {
        // احتياط في حالة عدم وجود صورة
        realDrugImage.style.display = 'none';
        placeholderIcon.style.display = 'block';
      }

      // إعادة تعيين التدوير لوضع البداية
      currentRotateX = 0;
      currentRotateY = 0;
      updateImageRotation();
    }

    // بناء البطاقات
    function buildCards() {
      drugGrid.innerHTML = '';
      drugsData.forEach(drug => {
        const card = document.createElement('div');
        card.className = 'drug-card';
        card.innerHTML = `
          <div class="drug-icon"><i class="${drug.icon}"></i></div>
          <div class="drug-name">${drug.name}</div>
          <div class="drug-sub">${drug.brand}</div>
          <button class="btn-view"><i class="fas fa-eye"></i> عرض العلبة</button>
        `;
        card.addEventListener('click', () => {
          displayDrug(drug);
          document.getElementById('displayArea').scrollIntoView({ behavior: 'smooth' });
        });
        drugGrid.appendChild(card);
      });
    }

    // تحميل افتراضي لأول دواء
    function loadDefault() {
      if (drugsData.length > 0) {
        displayDrug(drugsData[0]);
      }
    }

    buildCards();
    loadDefault();
    image3DCard.style.cursor = 'grab';
  })();
</script>
</body>
</html>
