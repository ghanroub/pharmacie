<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>دليل مسكنات الألم | PainRelief Pro</title>
  <!-- Font Awesome 6 للأيقونات -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #f0f5fe 0%, #e9f0fa 100%);
      color: #1a2b4c;
      line-height: 1.6;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 20, 50, 0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.7);
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 2.8rem;
      font-weight: 700;
      color: #0b2b5e;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    h1 i {
      background: #1e3c72;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 3rem;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #2c3e50;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(30,60,114,0.08);
      padding: 0.8rem 1.8rem;
      border-radius: 3rem;
      width: fit-content;
    }

    .disclaimer {
      background: #fff7e5;
      border-right: 6px solid #f0b34b;
      border-radius: 1.5rem;
      padding: 1.2rem 1.8rem;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-weight: 500;
      background: rgba(255,243,205,0.7);
      backdrop-filter: blur(8px);
    }

    .disclaimer i {
      font-size: 2rem;
      color: #d18e2c;
    }

    .drug-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin-top: 1rem;
    }

    .drug-card {
      background: white;
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      background: rgba(255,255,255,0.8);
    }

    .drug-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 40px rgba(20, 50, 100, 0.15);
      background: white;
      border-color: #b0c7e8;
    }

    .drug-icon {
      font-size: 2.8rem;
      background: #eef3ff;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 1.2rem;
      color: #1e3c72;
      transition: 0.3s;
    }

    .drug-card:hover .drug-icon {
      background: #d4e2ff;
      color: #0a2f5c;
    }

    .drug-name {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0b2b5e;
    }

    .drug-class {
      background: #eef2f9;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1.2rem;
      letter-spacing: 0.3px;
    }

    .description {
      font-size: 0.95rem;
      color: #3b4b66;
      margin-bottom: 1.8rem;
      line-height: 1.7;
      flex: 1;
    }

    .view-btn {
      background: transparent;
      border: 1.5px solid #1e3c72;
      color: #1e3c72;
      padding: 0.6rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: 0.3s;
      background: white;
      cursor: pointer;
    }

    .drug-card:hover .view-btn {
      background: #1e3c72;
      color: white;
      border-color: #1e3c72;
    }

    /* Modal / النافذة المنبثقة */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-box {
      background: white;
      border-radius: 2.5rem;
      max-width: 500px;
      width: 90%;
      padding: 2.2rem;
      position: relative;
      box-shadow: 0 40px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: modalPop 0.3s ease;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
    }

    @keyframes modalPop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .close-modal {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      background: #f0f2f5;
      border: none;
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #2c3e50;
      transition: 0.2s;
    }

    .close-modal:hover {
      background: #e0e5ec;
      color: #000;
    }

    .modal-drug-title {
      font-size: 2rem;
      font-weight: 700;
      color: #0b2b5e;
      margin: 0.8rem 0 0.3rem;
    }

    .modal-class {
      background: #eef2f9;
      display: inline-block;
      padding: 0.3rem 1.5rem;
      border-radius: 2rem;
      margin-bottom: 1.5rem;
    }

    .package-image {
      background: #f4f7fd;
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 1.2rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border: 2px dashed #cbd6e8;
    }

    .package-image i {
      font-size: 5rem;
      color: #1e3c72;
      margin-bottom: 0.5rem;
    }

    .package-image span {
      font-weight: 600;
      color: #1e3c72;
      background: white;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.9rem;
    }

    .modal-desc {
      color: #2c3e50;
      margin-top: 1rem;
      font-size: 1rem;
      line-height: 1.7;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: #5a6b84;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }
      .container {
        padding: 1.8rem 1.2rem;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <i class="fas fa-capsules"></i> 
      مسكنات الألم
    </h1>
    <div class="subtitle">
      <i class="fas fa-stethoscope"></i> دليل الأدوية الشائعة مع صور العبوات التجارية
    </div>
    <div class="disclaimer">
      <i class="fas fa-exclamation-triangle"></i>
      <span><strong>تنبيه طبي:</strong> هذه المعلومات للأغراض التعليمية فقط. استشر طبيبك قبل تناول أي دواء.</span>
    </div>

    <!-- شبكة الأدوية -->
    <div class="drug-grid" id="drugGrid"></div>
    <footer>
      <i class="far fa-copyright"></i> PainRelief Pro · مرجع تعريفي بمسكنات الألم
    </footer>
  </div>

  <!-- النافذة المنبثقة لعرض الصورة التجارية -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
      <div id="modalContent">
        <!-- يتم تعبئته ديناميكياً -->
      </div>
    </div>
  </div>

  <script>
    (function() {
      // قاعدة بيانات الأدوية مع شرح وصور تمثل العبوات التجارية (باستخدام أيقونات وصور توضيحية)
      const drugs = [
        {
          id: 1,
          name: "باراسيتامول",
          className: "مسكن ألم / خافض حرارة",
          description: "يُستخدم لتسكين الآلام الخفيفة إلى المتوسطة والحمى. آمن نسبياً للمعدة مقارنة بمضادات الالتهاب.",
          icon: "fa-solid fa-pills",
          // صورة تجارية (سنستخدم تمثيل بصري للعلبة مع رمز مميز)
          packageImage: "💊 باراسيتامول 500mg",
          packageDetail: "عبوة أقراص (ريفانين، بنادول، أدول)",
          colorTheme: "#e74c3c"
        },
        {
          id: 2,
          name: "إيبوبروفين",
          className: "مضاد التهاب غير ستيرويدي",
          description: "مسكن للألم ومضاد للالتهاب وخافض للحرارة. مناسب لآلام العضلات والصداع وآلام الدورة الشهرية.",
          icon: "fa-solid fa-tablets",
          packageImage: "🔴 إيبوبروفين 400mg",
          packageDetail: "علبة (بروفين، موترين، أدفيل)",
          colorTheme: "#c44536"
        },
        {
          id: 3,
          name: "ديكلوفيناك",
          className: "مضاد التهاب قوي",
          description: "يستخدم لتسكين آلام العظام والمفاصل والالتهابات الحادة. يتوفر بشكل حبوب ومرهم موضعي.",
          icon: "fa-solid fa-joint",
          packageImage: "🟠 ديكلوفيناك صوديوم 50mg",
          packageDetail: "علبة (فولتارين، أولفين، رابيدوس)",
          colorTheme: "#d35400"
        },
        {
          id: 4,
          name: "نابروكسين",
          className: "مضاد التهاب طويل المفعول",
          description: "مسكن ألم فعال لالتهابات المفاصل والنقرس وآلام الظهر. يدوم تأثيره لفترة أطول.",
          icon: "fa-solid fa-capsules",
          packageImage: "🟡 نابروكسين 250mg / 500mg",
          packageDetail: "عبوة (نابروسين، أليف، بروكسين)",
          colorTheme: "#e67e22"
        },
        {
          id: 5,
          name: "أسبرين",
          className: "مسكن / مميع للدم",
          description: "مسكن ألم وخافض حرارة، بجرعات منخفضة يستخدم كمضاد لتجمع الصفائح الدموية.",
          icon: "fa-solid fa-heart-pulse",
          packageImage: "⚪ أسبرين 100mg / 81mg",
          packageDetail: "علبة (أسبرين بروتكت، أسبوسيد)",
          colorTheme: "#7f8c8d"
        },
        {
          id: 6,
          name: "سيليكوكسيب",
          className: "مثبط COX-2 انتقائي",
          description: "مضاد التهاب أقل تأثيراً على المعدة، يستخدم لالتهاب المفاصل والألم المزمن.",
          icon: "fa-solid fa-shield-haltered",
          packageImage: "🔵 سيليكوكسيب 200mg",
          packageDetail: "عبوة (سيليبريكس، كوبيكس)",
          colorTheme: "#2980b9"
        }
      ];

      const drugGrid = document.getElementById('drugGrid');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalContent = document.getElementById('modalContent');
      const closeModalBtn = document.getElementById('closeModalBtn');

      // بناء بطاقات الأدوية
      function renderDrugCards() {
        if (!drugGrid) return;
        drugGrid.innerHTML = drugs.map(drug => {
          return `
            <div class="drug-card" data-id="${drug.id}">
              <div class="drug-icon">
                <i class="${drug.icon}"></i>
              </div>
              <h3 class="drug-name">${drug.name}</h3>
              <span class="drug-class">${drug.className}</span>
              <p class="description">${drug.description}</p>
              <div class="view-btn">
                <i class="fas fa-eye"></i> عرض العبوة التجارية
              </div>
            </div>
          `;
        }).join('');

        // إضافة مستمعي الأحداث للبطاقات
        document.querySelectorAll('.drug-card').forEach(card => {
          card.addEventListener('click', function(e) {
            const drugId = parseInt(this.getAttribute('data-id'), 10);
            const selectedDrug = drugs.find(d => d.id === drugId);
            if (selectedDrug) {
              openModal(selectedDrug);
            }
          });
        });
      }

      // فتح النافذة المنبثقة مع تفاصيل الدواء وصورة العبوة
      function openModal(drug) {
        if (!modalContent || !modalOverlay) return;
        
        const html = `
          <div style="text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 0.3rem; color: #1e3c72;">
              <i class="${drug.icon}"></i>
            </div>
            <h2 class="modal-drug-title">${drug.name}</h2>
            <span class="modal-class">${drug.className}</span>
            
            <div class="package-image">
              <i class="fas fa-box-open" style="font-size: 3.5rem; color: #2c3e50;"></i>
              <div style="font-weight: 700; font-size: 1.4rem; margin: 0.7rem 0 0.3rem; color: #0b2b5e;">
                ${drug.packageImage}
              </div>
              <span style="background: #eef3ff; padding: 0.4rem 1.5rem; border-radius: 2rem; font-size: 0.9rem;">
                <i class="fas fa-prescription-bottle-alt"></i> ${drug.packageDetail}
              </span>
              <div style="margin-top: 1rem; font-size: 2.5rem; opacity: 0.8;">
                💊📦
              </div>
            </div>
            
            <p class="modal-desc">${drug.description}</p>
            <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: 1rem;">
              <i class="fas fa-info-circle"></i> الصورة توضيحية للعبوة التجارية الشائعة
            </p>
          </div>
        `;
        
        modalContent.innerHTML = html;
        modalOverlay.classList.add('active');
      }

      // إغلاق النافذة
      function closeModal() {
        if (modalOverlay) {
          modalOverlay.classList.remove('active');
        }
      }

      // أحداث الإغلاق
      if (closeModalBtn) {
        closeModalBtn.addEventListener('click', closeModal);
      }

      if (modalOverlay) {
        modalOverlay.addEventListener('click', function(e) {
          if (e.target === modalOverlay) {
            closeModal();
          }
        });
      }

      // إغلاق بمفتاح Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modalOverlay && modalOverlay.classList.contains('active')) {
          closeModal();
        }
      });

      // بدء العرض
      renderDrugCards();
    })();
  </script>
</body>
</html>
